name: Publish to PyPI

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Run tests before publishing ──────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite
        run: pytest --cov=puredata --cov-report=term-missing

  # ── 2. Build wheel + sdist ───────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install hatch twine

      - name: Build wheel and sdist
        run: hatch build

      - name: Check packages with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI (always on tag) ───────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/puredata
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── 4. Publish to PyPI (production) ──────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/puredata
    permissions:
      id-token: write  # Required for trusted publishing (no API token needed)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 5. Create GitHub Release with dist files ──────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pip install puredata==${{ github.ref_name }}
            ```

            ## Links
            - [PyPI](https://pypi.org/project/puredata/${{ github.ref_name }}/)
            - [Changelog](https://github.com/vignesh2027/puredata.py/blob/main/CHANGELOG.md)
            - [Documentation](https://vignesh2027.github.io/puredata)
